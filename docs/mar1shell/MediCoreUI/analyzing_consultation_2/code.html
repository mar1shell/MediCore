<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#8f54ff", 
              "primary-light": "#a77aff",
              "background-light": "#fdfcff", 
              "background-dark": "#1a1025", 
              "surface-light": "#ffffff",
              "surface-dark": "#2d1f3d",
              "orb-dark": "#1a1a2e",
            },
            fontFamily: {
              display: ["Urbanist", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "1rem",
            },
            animation: {
                'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'float': 'float 6s ease-in-out infinite',
                'glow': 'glow 3s ease-in-out infinite alternate',
                'breathe': 'breathe 4s ease-in-out infinite',
                'eye-blink': 'blink 4s infinite',
            },
            keyframes: {
                float: {
                    '0%, 100%': { transform: 'translateY(0)' },
                    '50%': { transform: 'translateY(-10px)' },
                },
                glow: {
                    'from': { boxShadow: '0 0 20px rgba(255, 255, 255, 0.3), 0 0 40px rgba(143, 84, 255, 0.2)' },
                    'to': { boxShadow: '0 0 40px rgba(255, 255, 255, 0.6), 0 0 80px rgba(143, 84, 255, 0.4)' },
                },
                breathe: {
                    '0%, 100%': { transform: 'scale(1)' },
                    '50%': { transform: 'scale(1.03)' },
                },
                blink: {
                    '0%, 96%, 100%': { transform: 'scaleY(1)' },
                    '98%': { transform: 'scaleY(0.1)' },
                }
            }
          },
        },
      };
    </script>
