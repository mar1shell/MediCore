openapi: "3.1.0"
info:
  title: MedRound API
  version: "0.1.0"

paths:
  /upload-chart:
    post:
      summary: Upload a patient chart PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OCR-extracted text
          content:
            application/json:
              schema:
                type: object
                properties:
                  raw_text:
                    type: string

  /extract-entities:
    post:
      summary: Extract medical entities from text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
      responses:
        "200":
          description: Extracted entities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityData"

  /cross-reference:
    post:
      summary: Compare chart vs spoken entities and return flags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                chart_data:
                  $ref: "#/components/schemas/EntityData"
                spoken_data:
                  $ref: "#/components/schemas/EntityData"
      responses:
        "200":
          description: List of discrepancy flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  flags:
                    type: array
                    items:
                      $ref: "#/components/schemas/DiscrepancyFlag"

components:
  schemas:
    EntityData:
      type: object
      required: [allergies, medications, diagnosis]
      properties:
        allergies:
          type: array
          items:
            type: string
        medications:
          type: array
          items:
            type: string
        diagnosis:
          type: array
          items:
            type: string

    DiscrepancyFlag:
      type: object
      required: [severity, field, chart_val, spoken_val, message]
      properties:
        severity:
          type: string
          enum: [high, medium, low]
        field:
          type: string
          enum: [allergies, medications, diagnosis]
        chart_val:
          type: string
        spoken_val:
          type: string
        message:
          type: string
